version: "2"

run:
  timeout: 5m
  go: "1.24"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - errcheck
    - revive
  settings:
    errcheck:
      exclude-functions:
        - "(*os.File).Close"
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  sort-order:
    - linter
    - file
