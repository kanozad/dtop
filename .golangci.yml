version: "1"

run:
  timeout: 5m
  tests: true
  go: "1.24"

linters:
  enable:
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - errcheck
    - revive

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false

output:
  sort-results: true
